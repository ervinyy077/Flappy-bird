<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Ervin's Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #70c5ce;
            font-family: 'Press+Start+2P', cursive;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #70c5ce;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }

        .menu-card {
            background: rgba(222, 216, 149, 0.9);
            border: 4px solid #543847;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            pointer-events: auto;
            color: #543847;
            text-shadow: none;
            box-shadow: 0 10px 0 #807832;
        }

        .btn {
            background: #e86101;
            border: 4px solid #543847;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1rem;
            transition: transform 0.1s;
            box-shadow: 0 5px 0 #a04000;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a04000;
        }

        #score-display {
            position: absolute;
            top: 50px;
            font-size: 3rem;
            pointer-events: none;
            z-index: 5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-display">0</div>
    
    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="ui-layer">
        <div class="menu-card">
            <h1 class="text-2xl mb-4">FLAPPY BIRD</h1>
            <p class="text-xs mb-6">PRESS SPACE OR TAP TO FLY</p>
            <button class="btn" id="start-btn">START GAME</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="ui-layer hidden">
        <div class="menu-card">
            <h1 class="text-xl mb-4">GAME OVER</h1>
            <div class="mb-2">SCORE: <span id="final-score">0</span></div>
            <div class="mb-6">BEST: <span id="best-score">0</span></div>
            <button class="btn" id="restart-btn">RETRY</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreText = document.getElementById('final-score');
    const bestScoreText = document.getElementById('best-score');
    
    // Game Constants
    const GRAVITY = 0.25;
    const JUMP_STRENGTH = -5.5;
    const PIPE_SPEED = 2.5;
    const PIPE_SPAWN_RATE = 90; // frames
    const PIPE_GAP = 160;
    const BIRD_X = 50;

    // Game State
    let bird = { x: BIRD_X, y: 0, velocity: 0, radius: 15, rotation: 0 };
    let pipes = [];
    let score = 0;
    let highScore = localStorage.getItem('flappyHighScore') || 0;
    let frameCount = 0;
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let animationId;

    // Responsive Canvas
    function resize() {
        const height = window.innerHeight;
        const width = Math.min(window.innerWidth, 450); // Cap width for desktop
        canvas.width = width;
        canvas.height = height;
        
        if (gameState === 'START') {
            bird.y = canvas.height / 2;
        }
    }

    window.addEventListener('resize', resize);
    resize();

    // Input Handling
    function handleInput(e) {
        if (e.type === 'keydown' && e.code !== 'Space') return;
        
        if (gameState === 'PLAYING') {
            bird.velocity = JUMP_STRENGTH;
        } else if (gameState === 'START' && (e.target.id === 'start-btn' || e.target.closest('#start-btn'))) {
            startGame();
        } else if (gameState === 'GAMEOVER' && (e.target.id === 'restart-btn' || e.target.closest('#restart-btn'))) {
            resetGame();
            startGame();
        }
    }

    window.addEventListener('keydown', handleInput);
    window.addEventListener('touchstart', (e) => {
        if (gameState === 'PLAYING') {
            e.preventDefault();
            bird.velocity = JUMP_STRENGTH;
        }
    }, { passive: false });
    window.addEventListener('mousedown', (e) => {
        if (gameState === 'PLAYING') handleInput(e);
    });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', () => {
        resetGame();
        startGame();
    });

    function startGame() {
        gameState = 'PLAYING';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        scoreDisplay.classList.remove('hidden');
        gameLoop();
    }

    function resetGame() {
        bird = { x: BIRD_X, y: canvas.height / 2, velocity: 0, radius: 15, rotation: 0 };
        pipes = [];
        score = 0;
        frameCount = 0;
        scoreDisplay.innerText = '0';
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        cancelAnimationFrame(animationId);
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappyHighScore', highScore);
        }
        
        finalScoreText.innerText = score;
        bestScoreText.innerText = highScore;
        gameOverScreen.classList.remove('hidden');
    }

    function spawnPipe() {
        const minHeight = 50;
        const maxHeight = canvas.height - PIPE_GAP - 100;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        
        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            passed: false,
            width: 60
        });
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        // Bird Physics
        bird.velocity += GRAVITY;
        bird.y += bird.velocity;
        
        // Rotation based on velocity
        bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.1));

        // Ground/Ceiling Collision
        if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
            gameOver();
        }

        // Pipe Management
        if (frameCount % PIPE_SPAWN_RATE === 0) {
            spawnPipe();
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= PIPE_SPEED;

            // Collision Detection
            const birdRight = bird.x + bird.radius - 5;
            const birdLeft = bird.x - bird.radius + 5;
            const birdTop = bird.y - bird.radius + 5;
            const birdBottom = bird.y + bird.radius - 5;

            const pipeRight = p.x + p.width;
            const pipeLeft = p.x;
            const topPipeBottom = p.topHeight;
            const bottomPipeTop = p.topHeight + PIPE_GAP;

            if (birdRight > pipeLeft && birdLeft < pipeRight) {
                if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
                    gameOver();
                }
            }

            // Scoring
            if (!p.passed && bird.x > pipeRight) {
                p.passed = true;
                score++;
                scoreDisplay.innerText = score;
            }

            // Remove off-screen pipes
            if (p.x + p.width < 0) {
                pipes.splice(i, 1);
            }
        }

        frameCount++;
    }

    function draw() {
        // Clear screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Background (Sky Gradient)
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#4ec0ca');
        grad.addColorStop(1, '#70c5ce');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Pipes
        pipes.forEach(p => {
            ctx.fillStyle = '#73bf2e';
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 4;

            // Top Pipe
            ctx.fillRect(p.x, 0, p.width, p.topHeight);
            ctx.strokeRect(p.x, 0, p.width, p.topHeight);
            // Cap for top
            ctx.fillRect(p.x - 5, p.topHeight - 20, p.width + 10, 20);
            ctx.strokeRect(p.x - 5, p.topHeight - 20, p.width + 10, 20);

            // Bottom Pipe
            ctx.fillRect(p.x, p.topHeight + PIPE_GAP, p.width, canvas.height);
            ctx.strokeRect(p.x, p.topHeight + PIPE_GAP, p.width, canvas.height);
            // Cap for bottom
            ctx.fillRect(p.x - 5, p.topHeight + PIPE_GAP, p.width + 10, 20);
            ctx.strokeRect(p.x - 5, p.topHeight + PIPE_GAP, p.width + 10, 20);
        });

        // Hover effect for start state
        if (gameState === 'START') {
            bird.y = (canvas.height / 2) + Math.sin(Date.now() / 200) * 10;
        }

        // Draw Bird
        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.rotate(bird.rotation);
        
        // Bird body
        ctx.fillStyle = '#f7d010';
        ctx.beginPath();
        ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#543847';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Eye
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(7, -5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(9, -5, 2, 0, Math.PI * 2);
        ctx.fill();

        // Beak
        ctx.fillStyle = '#f75b10';
        ctx.beginPath();
        ctx.moveTo(10, 2);
        ctx.lineTo(22, 5);
        ctx.lineTo(10, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Wing
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(-5, 2, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        if (gameState === 'PLAYING') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    // Initial render for start screen
    function initialRender() {
        draw();
        if (gameState === 'START') requestAnimationFrame(initialRender);
    }
    initialRender();

</script>
</body>
</html>
